version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: resiliocart_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-resiliocart}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-resiliocart}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resiliocart_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resiliocart_web
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-resiliocart}?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - resiliocart_net

  nginx:
    image: nginx:1.25-alpine
    container_name: resiliocart_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - resiliocart_net

networks:
  resiliocart_net:
    driver: bridge

volumes:
  pgdata:
